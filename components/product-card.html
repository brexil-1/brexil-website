<!-- Product card template — {{placeholders}} filled in script.js. {{quantityBlock}} = meat OR egg options only (from product.category in data/products.js) -->
<article class="product-card" data-product-id="{{id}}" data-category="{{category}}">
  <div class="product-card-image-wrap">
    <img class="product-card-image" src="{{image}}" alt="{{name}}" data-category-label="{{categoryLabel}}" width="900" height="675" loading="lazy" decoding="async" referrerpolicy="no-referrer" />
  </div>
  <div class="product-card-body">
    <h3 class="product-card-title">{{name}}</h3>
    <p class="product-card-desc">{{description}}</p>
    <p class="product-card-price">{{price}}</p>
    {{quantityBlock}}
    <div class="product-special-wrap">
      <label class="product-special-label" for="product-sr-{{id}}">Special Request (optional)</label>
      <textarea
        class="product-special-input"
        id="product-sr-{{id}}"
        name="specialRequest"
        rows="2"
        maxlength="500"
        placeholder="e.g. Cut into small pieces, extra cleaning, thin slices for BBQ"
        spellcheck="true"
        autocomplete="off"
      ></textarea>
      <p class="product-special-note">
        We&rsquo;ll do our best to accommodate your request based on product suitability and availability. However, specific
        cuts or requirements may vary slightly.
      </p>
    </div>
    <div class="product-card-actions">
      <button type="button" class="btn add-to-cart" data-id="{{id}}" data-name="{{name}}" data-price="{{price}}">Add to Cart</button>
      <p class="product-in-cart" hidden>
        <span class="product-in-cart-label">In cart:</span>
        <span class="product-in-cart-qty"></span>
      </p>
    </div>
  </div>
</article>
